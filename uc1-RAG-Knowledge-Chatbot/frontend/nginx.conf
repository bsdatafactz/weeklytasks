server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: react-router-dom's BrowserRouter serves paths like /admin
    # client-side, but nginx has no such file on disk -- fall back to
    # index.html so a hard refresh/direct link to /admin doesn't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
