name: Deploy frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'uc1-RAG-Knowledge-Chatbot/frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./uc1-RAG-Knowledge-Chatbot/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE: https://rag-bs-backend.azurewebsites.net
          VITE_APP_API_KEY: ${{ secrets.VITE_APP_API_KEY }}
        run: npm run build

      - name: Deploy via SWA CLI
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_DEPLOYMENT_TOKEN }}
        run: npx --yes @azure/static-web-apps-cli@latest deploy ./dist --deployment-token "$SWA_CLI_DEPLOYMENT_TOKEN" --env production
