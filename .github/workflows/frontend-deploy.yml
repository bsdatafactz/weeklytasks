name: Deploy frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'uc1-RAG-Knowledge-Chatbot/frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE: https://rag-bs-backend.azurewebsites.net
          VITE_APP_API_KEY: ${{ secrets.VITE_APP_API_KEY }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_DEPLOYMENT_TOKEN }}
          action: "upload"
          app_location: "./uc1-RAG-Knowledge-Chatbot/frontend/"
          api_location: ""
          output_location: "dist"
