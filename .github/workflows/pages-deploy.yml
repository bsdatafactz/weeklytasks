name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'uc1-RAG-Knowledge-Chatbot/frontend/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./uc1-RAG-Knowledge-Chatbot/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE: https://rag-bs-backend.azurewebsites.net
          VITE_APP_API_KEY: ${{ secrets.VITE_APP_API_KEY }}
          VITE_BASE_PATH: /weeklytasks/
        run: npm run build

      - name: SPA fallback for client-side routing
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./uc1-RAG-Knowledge-Chatbot/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
