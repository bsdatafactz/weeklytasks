name: Deploy frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'uc1-RAG-Knowledge-Chatbot/frontend/**'
      - '.github/workflows/swa-deploy.yml'
  workflow_dispatch:

concurrency:
  group: swa
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./uc1-RAG-Knowledge-Chatbot/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE: https://rag-bs-backend.azurewebsites.net
          VITE_APP_API_KEY: ${{ secrets.VITE_APP_API_KEY }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/uc1-RAG-Knowledge-Chatbot/frontend"
          output_location: "dist"
          skip_app_build: true
